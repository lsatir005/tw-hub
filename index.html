<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
  <!-- PWA -->
  
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%233d7fff'/><text x='90' y='120' font-size='80' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>TW</text></svg>">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TW Hub">
  <meta name="theme-color" content="#0a0c10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TW Hub">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <!-- Inline PWA service worker kaydı -->

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIRE-WHEEL SHOP HUB</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--surface:#10131a;--s2:#161b24;--s3:#1c2230;
  --border:#1e2535;--b2:#262f42;
  --accent:#3d7fff;--green:#00e5a0;--orange:#f0883e;--purple:#a371f7;
  --text:#cdd6f0;--text2:#6b7899;--text3:#3a4260;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  --sw:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;display:flex;overflow:hidden;}

.hub-sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0;}
.hub-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.hub-badge{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;box-shadow:0 0 14px rgba(61,127,255,.4);flex-shrink:0;}
.hub-logo-name{font-size:14px;font-weight:800;}
.hub-logo-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;margin-top:1px;}
.hub-sec{padding:10px 8px 4px;}
.hub-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;padding:0 8px;margin-bottom:3px;}
.hub-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:600;transition:background .12s,color .12s;border:none;background:none;text-align:left;position:relative;}
.hub-btn:hover{background:var(--s2);color:var(--text);}
.hub-btn.active{background:rgba(61,127,255,.1);color:var(--accent);}
.hub-btn.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--accent);border-radius:0 2px 2px 0;}
.hub-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.hub-div{height:1px;background:var(--border);margin:5px 10px;}
.hub-footer{margin-top:auto;padding:8px;border-top:1px solid var(--border);}

.hub-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.hub-topbar{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;}
.hub-topbar-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.hub-topbar-right{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text3);}

.hub-view{display:none;flex:1;overflow:hidden;min-height:0;}
.hub-view.active{display:flex;flex-direction:column;}


/* YÖNETİCİ PANELİ */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.admin-overlay.open{display:flex;}
.admin-box{background:var(--surface);border:1px solid var(--b2);border-radius:12px;width:100%;max-width:520px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.admin-head{padding:14px 18px;background:var(--s2);border-bottom:1px solid var(--border);border-radius:12px 12px 0 0;display:flex;align-items:center;gap:10px;}
.admin-head-title{font-size:13px;font-weight:700;flex:1;color:var(--text);}
.admin-close{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:13px;padding:3px 9px;cursor:pointer;font-family:var(--sans);}
.admin-close:hover{border-color:var(--red,#f85149);color:var(--red,#f85149);}
.admin-body{padding:18px;display:flex;flex-direction:column;gap:14px;}
.admin-login{display:flex;flex-direction:column;gap:10px;}
.admin-inp{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:14px;padding:10px 12px;outline:none;width:100%;letter-spacing:.2em;}
.admin-inp:focus{border-color:var(--accent);}
.admin-login-btn{background:var(--accent);color:#fff;border:none;border-radius:4px;font-family:var(--sans);font-size:13px;font-weight:600;padding:10px;cursor:pointer;transition:opacity .15s;}
.admin-login-btn:hover{opacity:.85;}
.admin-err{font-size:12px;color:#f85149;font-family:var(--mono);text-align:center;display:none;}
.admin-panel{display:none;flex-direction:column;gap:12px;}
.admin-panel.show{display:flex;}
.admin-login.hide{display:none;}
.admin-section{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.admin-section-title{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
.admin-btn{width:100%;padding:9px;border-radius:5px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;text-align:left;display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.admin-btn:last-child{margin-bottom:0;}
.admin-btn:hover{border-color:var(--accent);color:var(--accent);}
.admin-btn.danger:hover{border-color:#f85149;color:#f85149;}
.admin-stat{font-family:var(--mono);font-size:12px;color:var(--text2);display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);} 
.admin-stat:last-child{border-bottom:none;}
.admin-stat span{color:var(--text);}


/* GİRİŞ EKRANI */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 36px;width:340px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.login-logo{width:44px;height:44px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;box-shadow:0 0 20px rgba(61,127,255,.4);margin-bottom:4px;}
.login-title{font-size:16px;font-weight:800;letter-spacing:-.01em;}
.login-sub{font-size:11px;color:var(--text2);font-family:var(--mono);letter-spacing:.05em;}
.login-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:16px;padding:11px 14px;outline:none;text-align:center;letter-spacing:.2em;}
.login-inp:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.login-btn:hover{opacity:.85;}
.login-err{font-size:11px;color:#f85149;font-family:var(--mono);display:none;}

/* OFFLINE BANNER */
.offline-banner{position:fixed;top:0;left:0;right:0;background:#f85149;color:#fff;text-align:center;font-size:12px;font-family:var(--mono);font-weight:600;padding:5px;z-index:400;display:none;letter-spacing:.05em;}
.offline-banner.show{display:block;}

/* VARDİYA MESAJI */
.vardiya-bar{background:rgba(63,185,80,.08);border-bottom:1px solid rgba(63,185,80,.2);padding:5px 18px;font-size:11px;font-family:var(--mono);color:#3fb950;display:none;align-items:center;gap:8px;flex-shrink:0;}
.vardiya-bar.show{display:flex;}
.vardiya-bar span{flex:1;}
.vardiya-close{background:none;border:none;color:#3fb950;cursor:pointer;font-size:13px;}

/* MİNİ SİDEBAR */
.hub-sidebar.mini{width:48px;}
.hub-sidebar.mini .hub-logo-name,.hub-sidebar.mini .hub-logo-sub,
.hub-sidebar.mini .hub-lbl,.hub-sidebar.mini .hub-btn span:not(.hub-ico),
.hub-sidebar.mini .hub-div{display:none;}
.hub-sidebar.mini .hub-btn{justify-content:center;padding:8px 0;}
.hub-sidebar.mini .hub-ico{width:auto;}
.hub-sidebar.mini .hub-badge{margin:0 auto;}
.hub-sidebar.mini .hub-logo{justify-content:center;padding:12px 0;}
.hub-sidebar.mini .hub-sec{padding:6px 4px 2px;}

/* SKELETON LOADING */
.skeleton{flex:1;padding:20px;display:flex;flex-direction:column;gap:12px;}
.skel-line{height:14px;background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;border-radius:4px;animation:skel 1.5s ease-in-out infinite;}
.skel-line.w60{width:60%;}
.skel-line.w80{width:80%;}
.skel-line.w40{width:40%;}
.skel-block{height:60px;background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;border-radius:6px;animation:skel 1.5s ease-in-out infinite;}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* TEMA */
body.light-mode{--bg:#f0f4f8;--surface:#ffffff;--s2:#f0f4f8;--s3:#e2e8f0;--border:#d1d9e0;--b2:#c4cdd6;--text:#1a2332;--text2:#4a5568;--text3:#a0aec0;}
.theme-btn{font-size:14px;cursor:pointer;background:none;border:none;padding:2px 4px;border-radius:4px;transition:background .15s;}
.theme-btn:hover{background:var(--s2);}

/* TOOLTIP */
[data-tip]{position:relative;}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a2332;color:#e6edf3;font-size:10px;font-family:var(--mono);padding:4px 8px;border-radius:4px;white-space:nowrap;z-index:999;pointer-events:none;}

/* SALT OKUNUR */
body.readonly .hub-btn[id^="nav-"]{opacity:1;}


/* ── MOBİL UYUM ────────────────────────────────────────────── */
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;line-height:1;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98;}
.overlay.show{display:block;}

@media(max-width:768px){
  /* SAFE AREA */
  body{ padding-top: env(safe-area-inset-top, 0px); }
  
  .hub-sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:999;
    transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
    width:75vw!important;max-width:280px;
    padding-top: env(safe-area-inset-top, 0px);
  }
  .hub-sidebar.mobile-open{transform:translateX(0)!important;box-shadow:4px 0 24px rgba(0,0,0,.5);}
  .hub-sidebar.mini{transform:translateX(-100%)!important;}
  .hub-main{width:100%!important;margin-left:0!important;}
  .hamburger{display:flex!important;align-items:center;justify-content:center;width:36px;height:36px;}
  .hub-topbar{padding:0 10px;gap:6px;height:48px;}
  .hub-topbar-title{font-size:12px;}
  .hub-home-scroll{padding:12px;}
  .hub-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .hub-card{padding:10px 12px;}
  .hub-card-icon{font-size:18px;margin-bottom:5px;}
  .hub-card-title{font-size:11px;}
  .hub-card-desc{font-size:10px;}
  .hub-card-btn{font-size:10px;padding:4px 10px;}
  .hub-iframe{height:calc(100vh - 48px - env(safe-area-inset-top,0px));}
  .hub-lbl{font-size:8px;}
  .hub-btn{font-size:12px;padding:8px 10px;}
  /* Admin modal */
  .admin-box{width:95vw!important;max-width:95vw!important;margin:16px;}
  /* Login */
  .login-box{width:88vw;padding:24px 20px;}
  /* Overlay tıklayınca kapat */
  .overlay.show{display:block;}
}

@media(max-width:480px){
  .hub-grid{grid-template-columns:1fr 1fr;}
  .hub-topbar-title span:last-child{display:none;}
}

/* HOME */
.hub-home-scroll{flex:1;overflow-y:auto;padding:24px 28px;}
.hub-greeting h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
.hub-greeting p{color:var(--text2);font-size:12px;font-family:var(--mono);margin-bottom:22px;}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.hub-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;cursor:pointer;transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden;}
.hub-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,var(--accent));opacity:0;transition:opacity .2s;}
.hub-card:hover{border-color:var(--b2);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.hub-card:hover::after{opacity:1;}
.hub-card-icon{font-size:24px;margin-bottom:8px;line-height:1;}
.hub-card-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.hub-card-desc{font-size:11px;color:var(--text2);line-height:1.5;font-family:var(--mono);}
.hub-card-btn{margin-top:12px;padding:5px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);border:none;color:#fff;transition:opacity .15s;display:inline-block;}
.hub-card-btn:hover{opacity:.85;}

/* IFRAME VIEW */
.hub-iframe{flex:1;width:100%;height:100%;border:none;display:block;background:var(--bg);}
.hub-loading{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text3);font-family:var(--mono);font-size:13px;}
.hub-loading-icon{font-size:36px;animation:spin 1.5s linear infinite;opacity:.5;}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
</style>
</head>
<body>


<!-- OFFLİNE BANNER -->
<div class="offline-banner" id="offlineBanner">⚡ İnternet bağlantısı yok — bazı özellikler çalışmayabilir</div>

<!-- GİRİŞ EKRANI -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">TW</div>
    <div class="login-title">TIRE-WHEEL SHOP HUB</div>
    <div class="login-sub">TIRE &amp; WHEEL SHOP</div>
    <input class="login-inp" type="password" id="loginInp" placeholder="••••••" maxlength="20"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Giriş</button>
    <div class="login-err" id="loginErr">⚠ Hatalı şifre</div>
  </div>
</div>

<!-- VARDİYA MESAJI -->
<div class="vardiya-bar" id="vardiyaBar">
  <span>📢</span><span id="vardiyaText"></span>
  <button class="vardiya-close" onclick="this.parentElement.classList.remove('show')">×</button>
</div>

<div class="overlay" id="sidebarOverlay" onclick="closeMobileMenu()"></div>
<aside class="hub-sidebar" id="hubSidebar">
  <div class="hub-logo">
    <div class="hub-badge">TW</div>
    <div>
      <div class="hub-logo-name">TIRE-WHEEL SHOP HUB</div>
      <div class="hub-logo-sub">TIRE & WHEEL SHOP</div>
    </div>
  </div>
  <div class="hub-sec">
    <div class="hub-lbl">Ana</div>
    <button class="hub-btn active" id="nav-home" onclick="hubNav('home',this)">
      <span class="hub-ico">⊞</span><span>Genel Bakış</span>
    </button>
  </div>
  <div class="hub-sec">
    <div class="hub-lbl">Araçlar</div>
    <button class="hub-btn" id="nav-form1" onclick="hubNav('form1',this)">
      <span class="hub-ico">✈</span><span>EASA Form 1</span>
    </button>
    <button class="hub-btn" id="nav-teardown" onclick="hubNav('teardown',this)">
      <span class="hub-ico">🔧</span><span>Teardown</span>
    </button>
    <button class="hub-btn" id="nav-rar" onclick="hubNav('rar',this)">
      <span class="hub-ico">🔄</span><span>RAR</span>
    </button>
  </div>
  <div class="hub-div"></div>
  <div class="hub-sec">
    <div class="hub-lbl">Yönetim</div>
    <button class="hub-btn" id="nav-parca_ref" onclick="hubNav('parca_ref',this)">
      <span class="hub-ico">🔩</span><span>Parça Ref</span>
    </button>
    <button class="hub-btn" id="nav-gf_kart" onclick="hubNav('gf_kart',this)">
      <span class="hub-ico">🔴</span><span>GF Kartı</span>
    </button>
    <button class="hub-btn" id="nav-mail_taslak" onclick="hubNav('mail_taslak',this)">
      <span class="hub-ico">✉</span><span>Mail Taslak</span>
    </button>
    <button class="hub-btn" id="nav-notes" onclick="hubNav('notes',this)">
      <span class="hub-ico">📋</span><span>Notlar</span>
    </button>
  </div>
  <div class="hub-footer">
    <button class="hub-btn" data-tip="Yönetici" style="color:var(--text3);font-size:12px" onclick="openAdmin()">
      <span class="hub-ico">🔐</span><span>Yönetici</span>
    </button>
    <button class="hub-btn" data-tip="Vardiya mesajı" style="color:var(--text3);font-size:12px" onclick="openVardiya()">
      <span class="hub-ico">📢</span><span>Vardiya</span>
    </button>
  </div>
</aside>

<div class="hub-main">
  <div class="hub-topbar"><button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()" aria-label="Menü">☰</button>
    <div class="hub-topbar-title" id="hubTitle"><span>⊞</span><span>Genel Bakış</span></div>
    <div class="hub-topbar-right" style="display:flex;align-items:center;gap:8px;"><span id="modeTag" style="font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:3px;"></span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" data-tip="Tema değiştir">🌙</button>
      <button class="theme-btn" onclick="toggleMini()" data-tip="Sidebar küçült/büyüt">◀</button>
      <span id="hubDate" style="font-family:var(--mono);font-size:11px;color:var(--text3);"></span>
    </div>
  </div>

  <!-- HOME -->
  <div class="hub-view active" id="hubview-home">
    <div class="hub-home-scroll">
      <div class="hub-greeting">
        <h1 id="hubGreeting">Merhaba 👋</h1>
        <p id="hubGreetDate"></p>
      </div>
      <div class="hub-grid" id="hubGrid"></div>
    </div>
  </div>

  <!-- FORM 1 -->
  <div class="hub-view" id="hubview-form1">
    <div class="hub-loading" id="load-form1">
      <div class="skeleton">
        <div class="skel-line w60"></div><div class="skel-line w80"></div>
        <div class="skel-block"></div><div class="skel-line w40"></div>
        <div class="skel-block"></div><div class="skel-line w60"></div>
      </div>
    </div>
    <iframe class="hub-iframe" id="iframe-form1" style="display:none"></iframe>
  </div>

  <!-- TEARDOWN -->
  <div class="hub-view" id="hubview-teardown">
    <div class="hub-loading" id="load-teardown">
      <div class="skeleton"><div class="skel-line w60"></div><div class="skel-block"></div><div class="skel-line w80"></div><div class="skel-block"></div></div>
    </div>
    <iframe class="hub-iframe" id="iframe-teardown" style="display:none"></iframe>
  </div>

  <!-- RAR -->
  <div class="hub-view" id="hubview-rar">
    <div class="hub-loading" id="load-rar">
      <div class="skeleton"><div class="skel-line w40"></div><div class="skel-block"></div><div class="skel-line w60"></div></div>
    </div>
    <iframe class="hub-iframe" id="iframe-rar" style="display:none"></iframe>
  </div>

  <!-- MAİL TASLAK -->
  <div class="hub-view" id="hubview-mail_taslak">
    <div class="hub-loading" id="load-mail_taslak">
      <div class="skeleton"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-block"></div><div class="skel-line w40"></div></div>
    </div>
    <iframe class="hub-iframe" id="iframe-mail_taslak" style="display:none"></iframe>
  </div>

  <!-- PARÇA REF -->
  <div class="hub-view" id="hubview-parca_ref">
    <div class="hub-loading" id="load-parca_ref">
      <div class="skeleton"><div class="skel-line w60"></div><div class="skel-block"></div><div class="skel-line w40"></div><div class="skel-block"></div></div>
    </div>

function loadTool(id) {
  const b64 = TOOL_DATA[id];
  if(!b64) return;
  const toolHtml = decodeURIComponent(escape(atob(b64)));
  const iframe = document.getElementById('iframe-'+id);
  iframe.onload = () => {
    document.getElementById('load-'+id).style.display = 'none';
    iframe.style.display = 'block';
    loaded[id] = true;
    // Readonly modunu iframe'e ilet
    try{
      iframe.contentWindow.postMessage({type:'SET_READONLY', value: !hubUnlocked}, '*');
    }catch(e){}
  };
  // srcdoc file:// protokolünde blob:null sorununu çözer
  iframe.srcdoc = toolHtml;
}

// ── PARÇA REF FİREBASE KÖPRÜSÜ ───────────────────────────────
(function(){
  // Firebase compat zaten hub'da yüklü mü kontrol et
  function initParcaRef(){
    if(typeof firebase === 'undefined') return;
    const db = firebase.database ? firebase.database() : null;
    if(!db) return;

    // Parça ref iframe'i dinle
    window.addEventListener('message', function(e){
      if(!e.data) return;

      // Parça ref hazır — veriyi gönder
      if(e.data.type === 'PARCA_READY'){
        db.ref('parcalar').on('value', snap=>{
          const data = snap.val();
          const jantlar = data ? Object.entries(data).map(([fbId,j])=>({
            id:fbId, fbId, ad:j.ad||fbId,
            parcalar: j.parcalar
              ? Object.entries(j.parcalar).map(([pFbId,p])=>({...p,id:p.id||pFbId,fbId:pFbId}))
              : []
          })) : [];
          const iframe = document.getElementById('iframe-parca_ref');
          if(iframe && iframe.contentWindow){
            iframe.contentWindow.postMessage({type:'PARCA_DATA', jantlar}, '*');
          }
        }, ()=>{
          const iframe = document.getElementById('iframe-parca_ref');
          if(iframe && iframe.contentWindow){
            iframe.contentWindow.postMessage({type:'PARCA_ERROR'}, '*');
          }
        });
      }

      // Firebase işlemleri
      if(e.data.type === 'PARCA_FB'){
        const op = e.data.op;
        if(op==='addJant')     db.ref('parcalar').push(e.data.data);
        if(op==='updateJant')  db.ref('parcalar/'+e.data.id).update(e.data.data);
        if(op==='delJant')     db.ref('parcalar/'+e.data.id).remove();
        if(op==='addParca')    db.ref('parcalar/'+e.data.jid+'/parcalar').push(e.data.data);
        if(op==='updateParca') db.ref('parcalar/'+e.data.jid+'/parcalar/'+e.data.pid).update(e.data.data);
        if(op==='delParca')    db.ref('parcalar/'+e.data.jid+'/parcalar/'+e.data.pid).remove();
      }
    });
  }

  // Hub hazır olduktan sonra başlat
  if(document.readyState==='complete') initParcaRef();
  else window.addEventListener('load', initParcaRef);
})();

// ── GİRİŞ & YETKİLENDİRME ────────────────────────────────────
const ADMIN_HASH = 'f65fb171793bb116f1d6161fa44f9003248eacf92cddad299f207fc52c5f15b6';
const USER_HASH  = '8c01e61acd39958ef2a592ffcc48eef8ee18160ca649037ffcbb278147204078';
let hubUnlocked = false;
let hubLoggedIn = false;

async function doLogin(){
  const pw = document.getElementById('loginInp').value;
  const errEl = document.getElementById('loginErr');
  if(!pw){ errEl.textContent='⚠ Şifre boş olamaz'; errEl.style.display='block'; return; }
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hash === ADMIN_HASH){
    hubUnlocked = true; hubLoggedIn = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.body.classList.remove('readonly');
    showHubToast('✅ Yönetici olarak giriş yapıldı');
    const mt = document.getElementById('modeTag');
    if(mt){ mt.textContent='🔐 Yönetici'; mt.style.background='rgba(31,111,235,.15)'; mt.style.color='#58a6ff'; }
    addLog('Yönetici girişi');
    loadVardiya();
  } else if(hash === USER_HASH){
    hubUnlocked = false; hubLoggedIn = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.body.classList.add('readonly');
    showHubToast('👁 Kullanıcı modunda girdiniz');
    const mt = document.getElementById('modeTag');
    if(mt){ mt.textContent='👁 Kullanıcı'; mt.style.background='rgba(63,185,80,.15)'; mt.style.color='#3fb950'; }
    addLog('Kullanıcı girişi');
    loadVardiya();
  } else {
    errEl.textContent = '⚠ Hatalı şifre';
    errEl.style.display = 'block';
    document.getElementById('loginInp').value = '';
    document.getElementById('loginInp').focus();
  }
}

// ── VARDİYA MESAJI ────────────────────────────────────────────
function loadVardiya(){
  fetch('https://mx-hub-36e72-default-rtdb.firebaseio.com/vardiya.json')
    .then(r=>r.json())
    .then(data=>{
      if(data && data.mesaj && data.aktif){
        document.getElementById('vardiyaText').textContent = data.mesaj;
        document.getElementById('vardiyaBar').classList.add('show');
      }
    }).catch(()=>{});
}

function openVardiya(){
  if(!hubUnlocked){ showHubToast('⚠ Bu özellik için yönetici girişi gerekli'); return; }
  const mesaj = prompt('Vardiya mesajı (boş bırakırsan kapatılır):',
    document.getElementById('vardiyaText').textContent || '');
  if(mesaj === null) return;
  fetch('https://mx-hub-36e72-default-rtdb.firebaseio.com/vardiya.json', {
    method:'PUT',
    body: JSON.stringify({mesaj: mesaj.trim(), aktif: mesaj.trim().length > 0, tarih: new Date().toLocaleString('tr-TR')})
  }).then(()=>{
    loadVardiya();
    showHubToast(mesaj.trim() ? '✓ Vardiya mesajı yayınlandı' : '✓ Mesaj kaldırıldı');
    addLog('Vardiya mesajı güncellendi');
  }).catch(()=>showHubToast('⚠ Bağlantı hatası'));
}

// ── LOG KAYITLARI ─────────────────────────────────────────────
const LOG_KEY = 'hub_logs';
function addLog(msg){
  try{
    const logs = JSON.parse(localStorage.getItem(LOG_KEY)||'[]');
    logs.unshift({
      t: new Date().toLocaleString('tr-TR'),
      m: msg,
      u: localStorage.getItem('mx_username')||'Anonim'
    });
    if(logs.length > 100) logs.pop(); // Son 100 log
    localStorage.setItem(LOG_KEY, JSON.stringify(logs));
  }catch(e){}
}

function getLogs(){
  try{ return JSON.parse(localStorage.getItem(LOG_KEY)||'[]'); }
  catch(e){ return []; }
}

function openAdmin() {
  document.getElementById('adminOverlay').classList.add('open');
  document.getElementById('adminPwInp').value = '';
  document.getElementById('adminErr').style.display = 'none';
  if (!adminUnlocked) {
    document.getElementById('adminLogin').classList.remove('hide');
    document.getElementById('adminPanel').classList.remove('show');
    setTimeout(() => document.getElementById('adminPwInp').focus(), 50);
  } else { showAdminPanel(); }
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('open');
}

function adminOverlayClick(e) {
  if (e.target === e.currentTarget) closeAdmin();
}

async function checkAdminPw() {
  const pw = document.getElementById('adminPwInp').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hash === ADMIN_HASH) {
    hubUnlocked = true;
    document.getElementById('adminErr').style.display = 'none';
    showAdminPanel();
  } else {
    document.getElementById('adminErr').style.display = 'block';
    document.getElementById('adminPwInp').value = '';
    document.getElementById('adminPwInp').focus();
  }
}

function showAdminPanel() {
  document.getElementById('adminLogin').classList.add('hide');
  document.getElementById('adminPanel').classList.add('show');
  fetch('https://mx-hub-36e72-default-rtdb.firebaseio.com/notes.json')
    .then(r => r.json())
    .then(data => {
      const notes = data ? Object.values(data) : [];
      window._adminNotes = notes;
      const cats = {}, authors = {};
      notes.forEach(n => {
        cats[n.category] = (cats[n.category] || 0) + 1;
        if (n.author) authors[n.author] = (authors[n.author] || 0) + 1;
      });
      document.getElementById('adminStats').innerHTML =
        '<div class="admin-stat">Toplam Not <span>' + notes.length + '</span></div>' +
        Object.entries(cats).map(([k,v]) => '<div class="admin-stat">' + k + ' <span>' + v + '</span></div>').join('') +
        '<div class="admin-stat" style="margin-top:6px;border-top:1px solid var(--b2);padding-top:6px">Katkı Sahipleri</div>' +
        Object.entries(authors).map(([k,v]) => '<div class="admin-stat">' + k + ' <span>' + v + ' not</span></div>').join('');
    }).catch(() => {
      document.getElementById('adminStats').innerHTML = '<div class="admin-stat">Firebase bağlantısı yok</div>';
    });
}

function adminBackup() {
  const notes = window._adminNotes || [];
  if (!notes.length) { alert('Not bulunamadı'); return; }
  const data = { tarih: new Date().toLocaleString('tr-TR'), not_sayisi: notes.length, notlar: notes };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'}));
  a.download = 'notlar_yedek.json';
  a.click();
  showHubToast('✓ ' + notes.length + ' not yedeklendi');
}

function adminBackupCSV() {
  const notes = window._adminNotes || [];
  if (!notes.length) { alert('Not bulunamadı'); return; }
  const rows = [['Baslik','Kategori','Yazar','Icerik','Tarih']];
  notes.forEach(n => rows.push([
    (n.title||'').replace(/"/g,'""'),
    n.category||'', n.author||'',
    (n.content||'').replace(/"/g,'""').replace(/\n/g,' '),
    new Date(n.createdAt).toLocaleString('tr-TR')
  ]));
  const csv = rows.map(r => r.map(c => '"' + c + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8'}));
  a.download = 'notlar_yedek.csv';
  a.click();
  showHubToast('✓ CSV indirildi');
}

function adminClearAll() {
  if (!confirm('TÜM NOTLAR SİLİNECEK! Emin misiniz?')) return;
  if (!confirm('Bu işlem geri alınamaz. Devam?')) return;
  fetch('https://mx-hub-36e72-default-rtdb.firebaseio.com/notes.json', {method: 'DELETE'})
    .then(() => { showHubToast('🗑 Tüm notlar silindi'); closeAdmin(); })
    .catch(() => alert('Silme hatası'));
}

function showHubToast(msg) {
  let t = document.getElementById('_hubToast');
  if (!t) {
    t = document.createElement('div'); t.id = '_hubToast';
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#3d7fff;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1'; t.style.transform = 'translateY(0)';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; }, 2500);
}

<script>
if('serviceWorker' in navigator){
  // Inline service worker — blob URL ile kaydet
  const swCode = `
    const CACHE = 'tw-hub-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      // Network first — Firebase için
      if(e.request.url.includes('firebaseio.com') || e.request.url.includes('googleapis.com')){
        return;
      }
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(()=>{
    console.log('SW registered');
  }).catch(()=>{});
}
</script>
